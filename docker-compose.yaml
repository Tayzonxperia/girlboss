services:
    signal:
        build:
            context: .
            dockerfile: ./docker/Signal.Dockerfile
        container_name: girlboss-signal
        restart: unless-stopped
        networks:
            - girlboss-network
        volumes:
            - ./:/app:rw
        # noinspection ComposeUnknownKeys
        attach: false
        logging:
            driver: none
    tritium:
        build:
            context: .
            dockerfile: ./docker/Tritium.Dockerfile
        container_name: girlboss-tritium
        restart: unless-stopped
        networks:
            - girlboss-network
        volumes:
            - ./:/app:rw
    mongodb:
        image: mongo:latest
        container_name: girlboss-mongodb
        user: mongodb
        volumes:
            - ./data/db:/data/db:rw
            - ./data/configdb:/data/configdb:rw
        restart: unless-stopped
        networks:
            - girlboss-network
    dragonfly:
        image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
        container_name: girlboss-dragonfly
        restart: unless-stopped
        networks:
            - girlboss-network
        command: ['--log_dir=/var/log/dragonfly', '--snapshot_cron=0 */6 * * *']
        volumes:
            - ./data/dragonfly:/data:rw
    web:
        build:
            context: .
            dockerfile: ./docker/Web.Dockerfile
        container_name: girlboss-web
        restart: unless-stopped
        ports:
            - '3000:3000'
        networks:
            - girlboss-network
        volumes:
            - ./web/:/app/web:rw
            - ./config.jsonc:/app/config.jsonc:r
            - ./core/mongoose.js:/app/core/mongoose.js:r
            - ./db/schemas:/app/db/schemas:r

networks:
    girlboss-network:
        driver: bridge
        name: girlboss-network
